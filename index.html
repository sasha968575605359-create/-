<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARS ELITE — Официальный Маркет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .premium-card {
            background: linear-gradient(145deg, #0f0f0f 0%, #050505 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-tab {
            color: #0088cc;
            border-bottom: 3px solid #0088cc;
        }
        .glow-btn {
            background: linear-gradient(135deg, #0088cc 0%, #005580 100%);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }
        .modal-overlay {
            display: none;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.8);
            position: fixed;
            inset: 0;
            z-index: 50;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }
        .copy-box {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 5px;
            font-size: 11px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <!-- Header -->
    <header class="w-full max-w-md flex justify-between items-center py-8">
        <div class="text-left">
            <h1 class="text-4xl font-black italic tracking-tighter">STARS <span class="text-cyan-500 uppercase">ELITE</span></h1>
            <p class="text-gray-500 text-[8px] uppercase tracking-[0.4em] font-bold">Gold Standard</p>
        </div>
        <button onclick="openCart()" class="relative p-4 bg-white/5 rounded-2xl border border-white/10">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-count" class="cart-badge hidden">0</span>
        </button>
    </header>

    <div class="w-full max-w-md flex-1 overflow-y-auto pb-40">
        <!-- Tabs -->
        <div class="flex mb-8 border-b border-white/5">
            <button onclick="switchTab('stars')" id="tab-stars" class="flex-1 py-4 text-xs font-black tracking-widest active-tab uppercase transition-all">STARS</button>
            <button onclick="switchTab('ton')" id="tab-ton" class="flex-1 py-4 text-xs font-black tracking-widest text-gray-600 uppercase transition-all">TON CRYPTO</button>
        </div>

        <div id="product-list" class="space-y-4"></div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 w-full max-w-md p-5 bg-black/80 backdrop-blur-md border-t border-white/5">
        <button onclick="checkout()" class="w-full glow-btn py-6 rounded-2xl font-black text-xl uppercase tracking-widest transition-all">
            Оформить заказ
        </button>
    </div>

    <!-- Modal: Cart -->
    <div id="cart-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-6 border border-white/10 flex flex-col max-h-[80vh]">
            <h2 class="text-2xl font-black mb-6 uppercase italic">Твоя корзина</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2">
                <!-- Items here -->
            </div>
            <div class="border-t border-white/10 pt-4 mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-500 font-bold uppercase text-xs">Итого к оплате:</span>
                    <span id="total-price" class="text-2xl font-black text-cyan-500">0</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal('cart-modal')" class="bg-white/5 py-4 rounded-xl font-bold uppercase text-xs">Назад</button>
                <button onclick="checkout()" class="glow-btn py-4 rounded-xl font-bold uppercase text-xs">Оплатить</button>
            </div>
        </div>
    </div>

    <!-- Modal: Contact & Payment -->
    <div id="contact-modal" class="modal-overlay">
        <div class="premium-card w-full max-w-md p-8 text-center border border-white/10 overflow-y-auto max-h-[90vh]">
            <div class="w-20 h-20 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-wallet text-3xl text-cyan-500"></i>
            </div>
            <h2 class="text-2xl font-black mb-4 uppercase">Оплата заказа</h2>
            
            <div id="payment-instructions" class="text-left text-sm space-y-4 mb-8">
                <!-- Dynamic text here -->
            </div>

            <p class="text-gray-400 text-[10px] mb-4 uppercase font-bold tracking-widest">После оплаты отправь скриншот чека менеджеру:</p>
            <a href="https://t.me/dolbayob89" class="block bg-white text-black py-4 rounded-xl font-black text-lg mb-4">@dolbayob89</a>
            <button onclick="closeModal('contact-modal')" class="text-gray-500 text-xs font-bold uppercase tracking-widest">Закрыть</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8693212521:AAE6y0aa5pPeMx6Oa8uRI1f8PvConZGNOiQ";
        const ADMIN_ID = "7811669365";
        const WALLET = "UQD3W--X8UafHqQK9GDyrYNuuEHWBQrvnOU61-s1shpGWdcr";
        const USERNAME = "@dolbayob89";
        
        let currentMode = 'stars';
        let cart = [];

        const items = {
            stars: [
                { id: 'st1', val: 25, cost: 15, cur: '⭐️' },
                { id: 'st2', val: 50, cost: 25, cur: '⭐️' },
                { id: 'st3', val: 100, cost: 50, cur: '⭐️' },
                { id: 'st4', val: 200, cost: 75, cur: '⭐️' },
                { id: 'st5', val: 300, cost: 100, cur: '⭐️' },
                { id: 'st6', val: 400, cost: 115, cur: '⭐️' }
            ],
            ton: [
                { id: 'tn1', val: 25, cost: 2, cur: 'TON' },
                { id: 'tn2', val: 50, cost: 4, cur: 'TON' },
                { id: 'tn3', val: 100, cost: 8, cur: 'TON' },
                { id: 'tn4', val: 200, cost: 5, cur: 'TON' },
                { id: 'tn5', val: 300, cost: 6, cur: 'TON' },
                { id: 'tn6', val: 400, cost: 3, cur: 'TON' }
            ]
        };

        function switchTab(mode) {
            currentMode = mode;
            renderUI();
        }

        function addToCart(id) {
            const product = items[currentMode].find(i => i.id === id);
            cart.push({...product, cartId: Date.now()});
            updateCartCounter();
            renderUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(i => i.cartId !== cartId);
            updateCartCounter();
            renderCartItems();
        }

        function updateCartCounter() {
            const badge = document.getElementById('cart-count');
            if (cart.length > 0) {
                badge.innerText = cart.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderUI() {
            document.getElementById('tab-stars').className = `flex-1 py-4 text-xs font-black tracking-widest uppercase ${currentMode === 'stars' ? 'active-tab' : 'text-gray-600'}`;
            document.getElementById('tab-ton').className = `flex-1 py-4 text-xs font-black tracking-widest uppercase ${currentMode === 'ton' ? 'active-tab' : 'text-gray-600'}`;
            
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            items[currentMode].forEach(item => {
                list.innerHTML += `
                    <div class="premium-card p-5 flex justify-between items-center transition-all border border-white/5">
                        <div>
                            <h3 class="text-xl font-black italic uppercase">${item.val} Stars</h3>
                            <p class="text-cyan-500 font-black">${item.cost} ${item.cur}</p>
                        </div>
                        <button onclick="addToCart('${item.id}')" class="bg-white/5 hover:bg-cyan-500 hover:text-black w-12 h-12 rounded-xl flex items-center justify-center transition-all">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>`;
            });
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-10 uppercase font-bold text-xs">Тут пусто, блять</p>';
                totalEl.innerText = '0';
                return;
            }

            let totals = {};
            cart.forEach(item => {
                totals[item.cur] = (totals[item.cur] || 0) + item.cost;
                container.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <p class="text-sm font-black italic uppercase">${item.val} Stars</p>
                            <p class="text-[10px] text-cyan-500 font-bold">${item.cost} ${item.cur}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-red-500 p-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>`;
            });

            const totalText = Object.entries(totals).map(([cur, val]) => `${val.toFixed(2)} ${cur}`).join(' + ');
            totalEl.innerText = totalText;
        }

        function openCart() {
            renderCartItems();
            document.getElementById('cart-modal').style.display = 'flex';
        }

        async function checkout() {
            if (cart.length === 0) return;
            
            let totals = {};
            cart.forEach(i => {
                totals[i.cur] = (totals[i.cur] || 0) + i.cost;
            });

            const starTotal = totals['⭐️'] || 0;
            const tonTotal = totals['TON'] || 0;

            const instrBox = document.getElementById('payment-instructions');
            instrBox.innerHTML = '';

            if (starTotal > 0 && tonTotal > 0) {
                instrBox.innerHTML = `
                    <div class="space-y-4">
                        <p class="font-bold uppercase text-xs text-gray-400">Для TON и Stars:</p>
                        <p class="leading-tight">Перешлите <span class="text-cyan-500 font-black">${starTotal.toFixed(0)}</span> звезд по этому юзернейму: <span class="font-black">${USERNAME}</span></p>
                        <p class="leading-tight">И <span class="text-cyan-500 font-black">${tonTotal.toFixed(2)}</span> TON по этому кошельку:</p>
                        <div class="copy-box">${WALLET}</div>
                    </div>`;
            } else if (tonTotal > 0) {
                instrBox.innerHTML = `
                    <div class="space-y-4">
                        <p class="font-bold uppercase text-xs text-gray-400">Для TON:</p>
                        <p class="leading-tight">Перешлите <span class="text-cyan-500 font-black">${tonTotal.toFixed(2)}</span> TON по этому кошельку:</p>
                        <div class="copy-box">${WALLET}</div>
                    </div>`;
            } else if (starTotal > 0) {
                instrBox.innerHTML = `
                    <div class="space-y-4">
                        <p class="font-bold uppercase text-xs text-gray-400">Для Stars:</p>
                        <p class="leading-tight">Перешлите <span class="text-cyan-500 font-black">${starTotal.toFixed(0)}</span> звезд по этому юзернейму: <span class="font-black">${USERNAME}</span></p>
                    </div>`;
            }

            closeModal('cart-modal');
            document.getElementById('contact-modal').style.display = 'flex';

            const itemsList = cart.map(i => `${i.val} Stars (${i.cost} ${i.cur})`).join('\n');
            const totalText = Object.entries(totals).map(([cur, val]) => `${val.toFixed(2)} ${cur}`).join(' + ');
            const message = `🚨 <b>НОВЫЙ ЗАКАЗ ИЗ КОРЗИНЫ!</b>\n\n📦 <b>Товары:</b>\n${itemsList}\n\n💰 <b>ИТОГО:</b> ${totalText}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`);
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        renderUI();
    </script>
</body>
</html>
